name: CI

on:
  # CI only runs on pull_requests — NOT on push to main.
  # Push to main triggers Deploy only (self-hosted runner can't handle
  # CI builds and production startup simultaneously without resource contention).
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.4'

# ─── NOTE ─────────────────────────────────────────────────────────────────────
# All jobs run on the self-hosted runner (production server) because
# GitHub-hosted runners (ubuntu-latest) require a paid plan.
# Lint & type-check are always informational (continue-on-error: true).
# Actual build + migrate + seed happen in the Deploy workflow via Docker.
# ──────────────────────────────────────────────────────────────────────────────

jobs:

  # ─── 1. Lint & Type-check ────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: self-hosted
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        run: |
          npm install -g pnpm@${{ env.PNPM_VERSION }} 2>/dev/null || true
          pnpm --version

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma client
        run: cd apps/backend && npx prisma generate
        continue-on-error: true

      - name: Build shared types
        run: pnpm --filter @eduplatform/types build
        continue-on-error: true

      - name: Type-check backend
        run: pnpm --filter backend run type-check
        continue-on-error: true

      - name: Type-check frontend
        run: pnpm --filter frontend run type-check
        continue-on-error: true

      - name: Lint all packages
        run: pnpm run lint
        continue-on-error: true

  # ─── 2. Backend Build check ──────────────────────────────────────────────
  build-backend:
    name: Backend Build
    runs-on: self-hosted
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        run: |
          npm install -g pnpm@${{ env.PNPM_VERSION }} 2>/dev/null || true
          pnpm --version

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma client
        run: cd apps/backend && npx prisma generate

      - name: Build backend
        run: pnpm --filter backend build

  # ─── 3. Frontend Build check ─────────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: self-hosted
    needs: lint

    env:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NEXT_PUBLIC_WS_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        run: |
          npm install -g pnpm@${{ env.PNPM_VERSION }} 2>/dev/null || true
          pnpm --version

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build shared types
        run: pnpm --filter @eduplatform/types build

      - name: Build frontend
        run: pnpm --filter frontend build
