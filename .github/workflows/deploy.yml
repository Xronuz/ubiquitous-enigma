name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /opt/eduplatform
          git fetch origin main
          git reset --hard origin/main

      - name: Rebuild and restart
        run: |
          cd /opt/eduplatform
          docker compose -f docker-compose.selfhost.yml up -d --build --no-deps backend nginx

      - name: Status
        run: |
          cd /opt/eduplatform
          docker compose -f docker-compose.selfhost.yml ps
