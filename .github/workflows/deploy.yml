name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check runner
        run: echo "Runner OK"

      - name: Write SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          head -1 ~/.ssh/id_rsa

      - name: Deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -p "$SSH_PORT" "$SSH_USER@$SSH_HOST"             'cd /opt/eduplatform && git pull origin main && docker compose -f docker-compose.selfhost.yml up -d --build --no-deps backend nginx && docker compose -f docker-compose.selfhost.yml ps'
