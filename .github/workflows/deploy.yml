name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:

      # 1. Eng yangi kodni yuklab olish
      - name: Pull latest code
        run: |
          set -e
          cd /opt/eduplatform
          git fetch origin main
          git reset --hard origin/main

      # 2. Faqat imagelarni qayta build qilish — MA'LUMOTLAR O'CHIRILMAYDI
      - name: Build images and start all services
        run: |
          set -e
          cd /opt/eduplatform
          docker compose -f docker-compose.selfhost.yml up -d --build

      # 3. Backend va frontend healthy bo'lishini kutish
      - name: Wait for services to become healthy
        run: |
          cd /opt/eduplatform

          echo "Waiting for backend (up to 4 min)..."
          for i in $(seq 1 48); do
            if docker compose -f docker-compose.selfhost.yml exec -T backend \
                wget -qO- http://localhost:3001/api/health >/dev/null 2>&1; then
              echo "Backend is healthy after $((i * 5))s"
              break
            fi
            if [ "$i" -eq 48 ]; then
              echo "Backend did not become healthy in 4 minutes"
              exit 1
            fi
            echo "  ${i}/48 - $((i * 5))s elapsed..."
            sleep 5
          done

          echo "Waiting for frontend (up to 90s)..."
          for i in $(seq 1 18); do
            if docker compose -f docker-compose.selfhost.yml exec -T frontend \
                wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1; then
              echo "Frontend is healthy after $((i * 5))s"
              break
            fi
            if [ "$i" -eq 18 ]; then
              echo "Frontend did not become healthy in 90 seconds"
              exit 1
            fi
            echo "  ${i}/18 - $((i * 5))s elapsed..."
            sleep 5
          done

          echo "All services healthy."

      # 4. Har doim ko'rsatiladigan holat
      - name: Status and logs
        if: always()
        run: |
          cd /opt/eduplatform
          echo "=== CONTAINERS ==="
          docker compose -f docker-compose.selfhost.yml ps
          echo ""
          echo "=== MIGRATE LOGS ==="
          docker compose -f docker-compose.selfhost.yml logs --tail=80 migrate 2>/dev/null || true
          echo ""
          echo "=== BACKEND LOGS (last 50) ==="
          docker compose -f docker-compose.selfhost.yml logs --tail=50 backend 2>/dev/null || true
          echo ""
          echo "=== FRONTEND LOGS (last 20) ==="
          docker compose -f docker-compose.selfhost.yml logs --tail=20 frontend 2>/dev/null || true
