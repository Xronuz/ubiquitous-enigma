name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:

      # 1. Eng yangi kodni yuklab olish
      - name: Pull latest code
        run: |
          set -e
          cd /opt/eduplatform
          git fetch origin main
          git reset --hard origin/main

      # 2. Containerlarni to'xtatish — MA'LUMOTLAR (volumes) O'CHIRILMAYDI
      #    caddy_data volumeni ASLO o'chirmang — TLS sertifikatlar shu yerda!
      - name: Stop containers (preserve volumes)
        run: |
          cd /opt/eduplatform
          docker compose -f docker-compose.selfhost.yml down --remove-orphans 2>/dev/null || true
          echo "Containers stopped. Volumes (DB, Redis, Caddy TLS certs) preserved."

      # 3. Imagelarni qayta build qilish va barcha servicelarni ishga tushirish
      - name: Build images and start all services
        run: |
          set -e
          cd /opt/eduplatform
          docker compose -f docker-compose.selfhost.yml up -d --build

      # 4. Caddy port 80 dan javob berishini kutish (real external check)
      #    Port 80 → 443 redirect (HTTP 301) yoki to'g'ridan API 200 — ikkalasi ham muvaffaqiyat
      - name: Wait for caddy on port 80
        run: |
          cd /opt/eduplatform
          echo "Waiting for caddy on port 80 (up to 5 min)..."
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/api/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "307" ]; then
              echo "Caddy healthy — HTTP $STATUS after $((i * 5))s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "ERROR: Caddy did not become healthy in 5 minutes (last HTTP status: $STATUS)"
              echo ""
              echo "=== PORT STATE ==="
              ss -tlnp | grep -E ':80|:443' || echo "(nothing listening on :80/:443)"
              echo ""
              echo "=== CADDY LOGS ==="
              docker compose -f docker-compose.selfhost.yml logs --tail=50 caddy 2>/dev/null || true
              echo ""
              echo "=== FRONTEND LOGS ==="
              docker compose -f docker-compose.selfhost.yml logs --tail=30 frontend 2>/dev/null || true
              echo ""
              echo "=== BACKEND LOGS ==="
              docker compose -f docker-compose.selfhost.yml logs --tail=30 backend 2>/dev/null || true
              exit 1
            fi
            echo "  ${i}/60 — HTTP ${STATUS} — $((i * 5))s elapsed..."
            sleep 5
          done

      # 5. Har doim ko'rsatiladigan holat
      - name: Status and logs
        if: always()
        run: |
          cd /opt/eduplatform
          echo "=== PORT 80/443 STATE ==="
          ss -tlnp | grep -E ':80|:443' || echo "(nothing listening on :80/:443)"
          echo ""
          echo "=== CONTAINERS ==="
          docker compose -f docker-compose.selfhost.yml ps
          echo ""
          echo "=== MIGRATE LOGS ==="
          docker compose -f docker-compose.selfhost.yml logs --tail=80 migrate 2>/dev/null || true
          echo ""
          echo "=== BACKEND LOGS (last 50) ==="
          docker compose -f docker-compose.selfhost.yml logs --tail=50 backend 2>/dev/null || true
          echo ""
          echo "=== CADDY LOGS (last 30) ==="
          docker compose -f docker-compose.selfhost.yml logs --tail=30 caddy 2>/dev/null || true
          echo ""
          echo "=== FRONTEND LOGS (last 20) ==="
          docker compose -f docker-compose.selfhost.yml logs --tail=20 frontend 2>/dev/null || true
          echo ""
          echo "=== DISK USAGE ==="
          docker system df 2>/dev/null || true
