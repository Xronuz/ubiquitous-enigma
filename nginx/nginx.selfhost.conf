# ═══════════════════════════════════════════════════════════════════════════════
# EduPlatform — Self-Hosted Nginx Config (HTTP port 80)
# SSL kerak bo'lsa: sudo certbot --nginx -d your-domain.com
# ═══════════════════════════════════════════════════════════════════════════════

user  nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - [$time_local] "$request" $status '
                  '$body_bytes_sent rt=$request_time';
  access_log /var/log/nginx/access.log main;

  # ── Performance ────────────────────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  server_tokens   off;
  client_max_body_size 50M;

  # ── Gzip ───────────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_types
    text/plain text/css application/json application/javascript
    text/xml application/xml image/svg+xml application/woff2;

  # ── Rate limiting ──────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m   rate=30r/m;
  limit_req_zone $binary_remote_addr zone=static:10m rate=200r/m;

  # ── Upstreams ──────────────────────────────────────────────────────────────
  upstream backend  {
    server backend:3001;
    keepalive 16;
  }
  upstream frontend {
    server frontend:3000;
    keepalive 8;
  }

  # ── Main server block ──────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # ── Auth endpoints (strict rate limit) ──────────────────────────────
    location /api/v1/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # ── API (all other endpoints) ─────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # ── WebSocket / Socket.io ─────────────────────────────────────────────
    location /socket.io/ {
      proxy_pass             http://backend;
      proxy_http_version     1.1;
      proxy_set_header       Upgrade    $http_upgrade;
      proxy_set_header       Connection "Upgrade";
      proxy_set_header       Host       $host;
      proxy_set_header       X-Real-IP  $remote_addr;
      proxy_read_timeout     86400s;
      proxy_send_timeout     86400s;
    }

    # ── Next.js static assets (aggressive cache) ──────────────────────────
    location /_next/static/ {
      limit_req zone=static burst=100 nodelay;
      proxy_pass http://frontend;
      expires    1y;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    location /_next/image {
      proxy_pass         http://frontend;
      proxy_set_header   Host $host;
      expires 7d;
      add_header Cache-Control "public";
    }

    # ── Health check (no logs) ────────────────────────────────────────────
    location = /api/health {
      proxy_pass http://backend/api/health;
      access_log off;
    }

    # ── Uploaded files ────────────────────────────────────────────────────
    location /uploads/ {
      proxy_pass       http://backend;
      proxy_set_header Host $host;
      expires 7d;
      add_header Cache-Control "public";
    }

    # ── Frontend (Next.js) — catch all ───────────────────────────────────
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }
  }
}
